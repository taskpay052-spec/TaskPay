<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TaskPay · Available Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f8fafc;
      font-family: 'Inter', sans-serif;
      color: #0f172a;
    }

    /* Navigation */
    .navbar {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon i {
      color: white;
      font-size: 18px;
    }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #065f46, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-link {
      text-decoration: none;
      color: #475569;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-link:hover, .nav-link.active {
      color: #059669;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .logout-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 8px;
      transition: color 0.2s;
    }

    .logout-btn:hover {
      color: #dc2626;
    }

    /* Main Content */
    .main-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: #64748b;
    }

    /* Stats Summary */
    .stats-summary {
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .stats-summary-item {
      color: white;
    }

    .stats-summary-item .label {
      font-size: 0.875rem;
      opacity: 0.9;
    }

    .stats-summary-item .value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.5rem 1.25rem;
      border: 2px solid #e2e8f0;
      background: white;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #059669;
      border-color: #059669;
      color: white;
    }

    .filter-btn:hover:not(.active) {
      border-color: #10b981;
      color: #059669;
    }

    /* Tasks Grid */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .task-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      transition: all 0.3s;
      cursor: pointer;
    }

    .task-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.15);
      border-color: #10b981;
    }

    .task-image {
      height: 160px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .task-image i {
      font-size: 48px;
      color: white;
      opacity: 0.8;
    }

    .task-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      color: white;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .task-content {
      padding: 1.25rem;
    }

    .task-title {
      font-size: 1.125rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    .task-description {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .task-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-top: 0.5rem;
      border-top: 1px solid #e2e8f0;
    }

    .task-time {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    .task-reward {
      font-weight: 700;
      color: #059669;
      font-size: 1.1rem;
    }

    .task-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .completed-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #10b981;
      font-weight: 500;
      font-size: 0.875rem;
    }

    .start-btn {
      background: #059669;
      color: white;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .start-btn:hover {
      background: #047857;
      transform: scale(0.98);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem;
      background: white;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
    }

    .empty-state i {
      font-size: 64px;
      color: #cbd5e1;
      margin-bottom: 1rem;
    }

    .empty-state h3 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      color: #64748b;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #0f172a;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 768px) {
      .main-container {
        padding: 1rem;
      }
      
      .nav-container {
        padding: 1rem;
      }
      
      .nav-links {
        display: none;
      }
      
      .tasks-grid {
        grid-template-columns: 1fr;
      }
      
      .stats-summary {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo" onclick="window.location.href='dashboard.html'">
        <div class="logo-icon">
          <i class="fas fa-tasks"></i>
        </div>
        <span class="logo-text">TaskPay</span>
      </div>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="tasks.html" class="nav-link active">Tasks</a>
        <a href="surveys.html" class="nav-link">Surveys</a>
        <a href="withdrawal.html" class="nav-link">Withdraw</a>
        <a href="profile.html" class="nav-link">Profile</a>
      </div>
      <div class="user-menu">
        <div class="user-avatar" id="userAvatar" onclick="window.location.href='profile.html'">U</div>
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="page-header">
      <h1>Available Tasks</h1>
      <p>Complete small tasks and earn real money. Each task takes just 1-3 minutes!</p>
    </div>

    <div class="stats-summary" id="statsSummary">
      <div class="stats-summary-item">
        <div class="label">Tasks Completed</div>
        <div class="value" id="completedCount">0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Total Earned from Tasks</div>
        <div class="value" id="tasksEarned">$0.00</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Available Tasks</div>
        <div class="value" id="availableCount">0</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All Tasks</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="highest">Highest Reward</button>
    </div>

    <div id="tasksContainer" class="tasks-grid">
      <!-- Tasks will be loaded here -->
    </div>
  </div>

  <script>
    // Complete Task Data
    const allTasks = [
      {
        id: "task_1",
        title: "Rate Mobile App Icon",
        description: "Quick 5-second rating task. Tell us what you think about our new app icon design!",
        reward: 0.35,
        timeEstimate: "30 sec",
        category: "quick",
        icon: "fa-star",
        color: "#f59e0b",
        instructions: [
          "Look at the app icon image",
          "Rate it from 1 to 5 stars",
          "Leave a brief comment",
          "Submit to earn your reward"
        ]
      },
      {
        id: "task_2",
        title: "Watch Product Preview",
        description: "Watch a short 30-second product preview and answer 1 simple question.",
        reward: 0.50,
        timeEstimate: "1 min",
        category: "video",
        icon: "fa-play",
        color: "#3b82f6",
        instructions: [
          "Watch the video preview",
          "Answer the question about the product",
          "Share any additional thoughts",
          "Submit to earn your reward"
        ]
      },
      {
        id: "task_3",
        title: "Share a Fun Fact",
        description: "Quick web search to find an interesting fact, then share it with us.",
        reward: 0.45,
        timeEstimate: "2 min",
        category: "writing",
        icon: "fa-pen",
        color: "#8b5cf6",
        instructions: [
          "Search for an interesting fun fact",
          "Write the fact in your own words",
          "Tell us why you found it interesting",
          "Submit to earn your reward"
        ]
      },
      {
        id: "task_4",
        title: "Weather Screenshot",
        description: "Take a screenshot of your local weather forecast and upload it.",
        reward: 0.60,
        timeEstimate: "1 min",
        category: "upload",
        icon: "fa-cloud-sun",
        color: "#06b6d4",
        instructions: [
          "Open your weather app or website",
          "Take a screenshot showing today's weather",
          "Upload the screenshot",
          "Submit to earn your reward"
        ]
      },
      {
        id: "task_5",
        title: "Voice Feedback",
        description: "Record a 20-second voice clip giving feedback on a new feature.",
        reward: 0.70,
        timeEstimate: "1 min",
        category: "audio",
        icon: "fa-microphone",
        color: "#ec489a",
        instructions: [
          "Click the record button",
          "Speak clearly for 20 seconds",
          "Share your honest thoughts",
          "Submit to earn your reward"
        ]
      },
      {
        id: "task_6",
        title: "Website Usability Test",
        description: "Visit a website and complete 3 simple tasks. Takes 2 minutes.",
        reward: 0.85,
        timeEstimate: "2 min",
        category: "testing",
        icon: "fa-globe",
        color: "#14b8a6",
        instructions: [
          "Visit the provided website",
          "Complete 3 simple tasks",
          "Rate your experience",
          "Submit feedback"
        ]
      },
      {
        id: "task_7",
        title: "Social Media Share",
        description: "Share a post about TaskPay on your social media.",
        reward: 0.55,
        timeEstimate: "1 min",
        category: "social",
        icon: "fa-share-alt",
        color: "#3b82f6",
        instructions: [
          "Copy the provided post",
          "Share on your social media",
          "Take a screenshot",
          "Upload the screenshot"
        ]
      },
      {
        id: "task_8",
        title: "Product Review",
        description: "Write a short 2-sentence review about a product.",
        reward: 0.65,
        timeEstimate: "2 min",
        category: "writing",
        icon: "fa-pencil-alt",
        color: "#8b5cf6",
        instructions: [
          "Review the product details",
          "Write a 2-sentence review",
          "Rate the product",
          "Submit your review"
        ]
      }
    ];

    let tasks = [];
    let currentUser = null;
    let completedTasks = [];
    let currentFilter = 'all';
    let tasksEarned = 0;

    function checkAuth() {
      const isLoggedIn = localStorage.getItem('taskpay_logged_in');
      if (isLoggedIn !== 'true') {
        window.location.href = 'login.html';
        return false;
      }
      currentUser = localStorage.getItem('taskpay_user_email');
      loadUserData();
      return true;
    }

    function loadUserData() {
      const userKey = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      const storedCompleted = localStorage.getItem(`taskpay_completed_tasks_${userKey}`);
      completedTasks = storedCompleted ? JSON.parse(storedCompleted) : [];
      
      const tasksDone = parseInt(localStorage.getItem(`taskpay_tasks_done_${userKey}`) || '0');
      const totalEarned = parseFloat(localStorage.getItem(`taskpay_total_earned_${userKey}`) || '0');
      
      // Calculate tasks earned (approximate based on tasks done)
      tasksEarned = totalEarned * 0.6; // Rough estimate for demo
      
      // Mark tasks as completed based on stored IDs
      tasks = allTasks.map(task => ({
        ...task,
        completed: completedTasks.includes(task.id)
      }));
      
      updateStats();
      renderTasks();
    }

    function updateStats() {
      const completedCount = tasks.filter(t => t.completed).length;
      const availableCount = tasks.filter(t => !t.completed).length;
      
      document.getElementById('completedCount').textContent = completedCount;
      document.getElementById('availableCount').textContent = availableCount;
      document.getElementById('tasksEarned').textContent = `$${tasksEarned.toFixed(2)}`;
      
      const userName = currentUser.split('@')[0];
      document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
    }

    function renderTasks() {
      let filteredTasks = [...tasks];
      
      switch(currentFilter) {
        case 'available':
          filteredTasks = filteredTasks.filter(t => !t.completed);
          break;
        case 'completed':
          filteredTasks = filteredTasks.filter(t => t.completed);
          break;
        case 'highest':
          filteredTasks = [...filteredTasks].sort((a, b) => b.reward - a.reward);
          break;
        default:
          filteredTasks = [...filteredTasks];
      }
      
      const container = document.getElementById('tasksContainer');
      
      if (filteredTasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <h3>No tasks found</h3>
            <p>${currentFilter === 'completed' ? 'You haven\'t completed any tasks yet.' : 'Check back later for new tasks!'}</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = filteredTasks.map(task => `
        <div class="task-card" data-task-id="${task.id}" data-completed="${task.completed}">
          <div class="task-image" style="background: linear-gradient(135deg, ${task.color}80, ${task.color});">
            <i class="fas ${task.icon}"></i>
            <span class="task-badge">${task.timeEstimate}</span>
          </div>
          <div class="task-content">
            <h3 class="task-title">${task.title}</h3>
            <p class="task-description">${task.description}</p>
            <div class="task-meta">
              <div class="task-time">
                <i class="fas fa-clock"></i>
                <span>${task.timeEstimate}</span>
              </div>
              <div class="task-reward">
                <i class="fas fa-dollar-sign"></i> ${task.reward.toFixed(2)}
              </div>
            </div>
            <div class="task-footer">
              ${task.completed ? 
                `<div class="completed-badge">
                  <i class="fas fa-check-circle"></i>
                  <span>Completed</span>
                </div>` : 
                `<button class="start-btn" onclick="startTask('${task.id}')">
                  <i class="fas fa-play"></i> Start Task
                </button>`
              }
            </div>
          </div>
        </div>
      `).join('');
    }

    function startTask(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (task.completed) {
        showToast('You already completed this task!', 'error');
        return;
      }
      
      // Store current task in session to load in task detail page
      sessionStorage.setItem('current_task', JSON.stringify(task));
      window.location.href = `task-detail.html?id=${taskId}`;
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function logout() {
      localStorage.removeItem('taskpay_logged_in');
      localStorage.removeItem('taskpay_user_email');
      window.location.href = 'login.html';
    }

    // Filter event listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTasks();
      });
    });

    document.getElementById('logoutBtn').addEventListener('click', logout);
    
    // Make startTask available globally
    window.startTask = startTask;
    
    // Initialize
    if (checkAuth()) {
      // No additional init needed
    }
  </script>
</body>
</html>
