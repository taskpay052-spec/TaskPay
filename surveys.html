<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TaskPay · Paid Surveys</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f8fafc;
      font-family: 'Inter', sans-serif;
      color: #0f172a;
    }

    /* Navigation */
    .navbar {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon i {
      color: white;
      font-size: 18px;
    }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #065f46, #059669);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-link {
      text-decoration: none;
      color: #475569;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-link:hover, .nav-link.active {
      color: #059669;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .logout-btn {
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 8px;
      transition: color 0.2s;
    }

    .logout-btn:hover {
      color: #dc2626;
    }

    /* Main Content */
    .main-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: #64748b;
    }

    /* Stats Summary */
    .stats-summary {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .stats-summary-item {
      color: white;
    }

    .stats-summary-item .label {
      font-size: 0.875rem;
      opacity: 0.9;
    }

    .stats-summary-item .value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    /* Category Pills */
    .categories {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .category-pill {
      padding: 0.5rem 1.25rem;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 40px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .category-pill:hover {
      border-color: #8b5cf6;
      color: #8b5cf6;
    }

    .category-pill.active {
      background: #8b5cf6;
      border-color: #8b5cf6;
      color: white;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.5rem 1.25rem;
      border: 2px solid #e2e8f0;
      background: white;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #8b5cf6;
      border-color: #8b5cf6;
      color: white;
    }

    .filter-btn:hover:not(.active) {
      border-color: #8b5cf6;
      color: #8b5cf6;
    }

    /* Surveys Grid */
    .surveys-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .survey-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      transition: all 0.3s;
      cursor: pointer;
    }

    .survey-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.15);
      border-color: #8b5cf6;
    }

    .survey-header {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      padding: 1.5rem;
      color: white;
      position: relative;
    }

    .survey-category {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .survey-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .survey-description {
      font-size: 0.875rem;
      opacity: 0.9;
      margin-bottom: 1rem;
    }

    .survey-stats {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
      opacity: 0.8;
    }

    .survey-content {
      padding: 1.25rem;
    }

    .reward-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .survey-reward {
      font-size: 1.5rem;
      font-weight: 800;
      color: #8b5cf6;
    }

    .survey-reward small {
      font-size: 0.875rem;
      font-weight: 500;
      color: #64748b;
    }

    .survey-time {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      color: #64748b;
      font-size: 0.875rem;
    }

    .survey-details {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: #64748b;
    }

    .detail-item i {
      width: 16px;
      color: #8b5cf6;
    }

    .tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .tag {
      background: #f1f5f9;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.7rem;
      color: #475569;
    }

    .survey-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid #e2e8f0;
    }

    .completed-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #10b981;
      font-weight: 500;
      font-size: 0.875rem;
    }

    .start-btn {
      background: #8b5cf6;
      color: white;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .start-btn:hover {
      background: #7c3aed;
      transform: scale(0.98);
    }

    /* Popular Survey Highlight */
    .popular-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: #f59e0b;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem;
      background: white;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
    }

    .empty-state i {
      font-size: 64px;
      color: #cbd5e1;
      margin-bottom: 1rem;
    }

    .empty-state h3 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }

    .empty-state p {
      color: #64748b;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #0f172a;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 768px) {
      .main-container {
        padding: 1rem;
      }
      
      .nav-container {
        padding: 1rem;
      }
      
      .nav-links {
        display: none;
      }
      
      .surveys-grid {
        grid-template-columns: 1fr;
      }
      
      .stats-summary {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo" onclick="window.location.href='dashboard.html'">
        <div class="logo-icon">
          <i class="fas fa-tasks"></i>
        </div>
        <span class="logo-text">TaskPay</span>
      </div>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="tasks.html" class="nav-link">Tasks</a>
        <a href="surveys.html" class="nav-link active">Surveys</a>
        <a href="withdrawal.html" class="nav-link">Withdraw</a>
        <a href="profile.html" class="nav-link">Profile</a>
      </div>
      <div class="user-menu">
        <div class="user-avatar" id="userAvatar" onclick="window.location.href='profile.html'">U</div>
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="page-header">
      <h1>Paid Surveys</h1>
      <p>Share your opinion and earn money. Your voice matters to top brands!</p>
    </div>

    <div class="stats-summary" id="statsSummary">
      <div class="stats-summary-item">
        <div class="label">Surveys Completed</div>
        <div class="value" id="completedCount">0</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Total Earned from Surveys</div>
        <div class="value" id="surveysEarned">$0.00</div>
      </div>
      <div class="stats-summary-item">
        <div class="label">Available Surveys</div>
        <div class="value" id="availableCount">0</div>
      </div>
    </div>

    <div class="categories">
      <div class="category-pill active" data-category="all">All Surveys</div>
      <div class="category-pill" data-category="consumer">Consumer</div>
      <div class="category-pill" data-category="tech">Tech & Gaming</div>
      <div class="category-pill" data-category="lifestyle">Lifestyle</div>
      <div class="category-pill" data-category="business">Business</div>
      <div class="category-pill" data-category="health">Health & Wellness</div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All Surveys</button>
      <button class="filter-btn" data-filter="available">Available</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="highest">Highest Reward</button>
      <button class="filter-btn" data-filter="short">Shortest</button>
    </div>

    <div id="surveysContainer" class="surveys-grid">
      <!-- Surveys will be loaded here -->
    </div>
  </div>

  <script>
    // Complete Survey Data
    const allSurveys = [
      {
        id: "survey_1",
        title: "Coffee Shop Habits",
        description: "Help us understand coffee drinking habits for market research.",
        reward: 0.80,
        timeEstimate: "3 min",
        questions: 3,
        category: "consumer",
        tags: ["Coffee", "Food & Drink", "Shopping"],
        popular: true,
        company: "Starbucks Research",
        icon: "fa-mug-hot",
        color: "#f59e0b",
        questionsList: [
          "How often do you visit coffee shops?",
          "What's your favorite coffee drink?",
          "How much do you typically spend per visit?"
        ]
      },
      {
        id: "survey_2",
        title: "Mobile Gaming Survey",
        description: "Share your mobile gaming preferences and habits.",
        reward: 0.90,
        timeEstimate: "4 min",
        questions: 4,
        category: "tech",
        tags: ["Gaming", "Mobile", "Entertainment"],
        popular: true,
        company: "GameDev Studios",
        icon: "fa-gamepad",
        color: "#8b5cf6",
        questionsList: [
          "How many hours per week do you play mobile games?",
          "What's your favorite game genre?",
          "Do you make in-app purchases?",
          "What makes you download a new game?"
        ]
      },
      {
        id: "survey_3",
        title: "Streaming Services Survey",
        description: "Tell us about your streaming service preferences.",
        reward: 1.00,
        timeEstimate: "5 min",
        questions: 5,
        category: "tech",
        tags: ["Streaming", "Entertainment", "TV"],
        popular: true,
        company: "Media Insights",
        icon: "fa-tv",
        color: "#ec489a",
        questionsList: [
          "Which streaming services do you use?",
          "How much do you spend monthly on streaming?",
          "What type of content do you watch most?",
          "How satisfied are you with your current services?",
          "Would you try a new streaming service?"
        ]
      },
      {
        id: "survey_4",
        title: "Work From Home Tools",
        description: "Share your experience with remote work tools.",
        reward: 0.75,
        timeEstimate: "3 min",
        questions: 3,
        category: "business",
        tags: ["Remote Work", "Productivity", "Tools"],
        company: "TechCorp Research",
        icon: "fa-laptop-code",
        color: "#06b6d4",
        questionsList: [
          "What tools do you use for work?",
          "How productive do you feel working from home?",
          "What would improve your WFH experience?"
        ]
      },
      {
        id: "survey_5",
        title: "Snack Brand Preferences",
        description: "Quick survey about your favorite snacks.",
        reward: 0.65,
        timeEstimate: "2 min",
        questions: 2,
        category: "consumer",
        tags: ["Food", "Snacks", "Shopping"],
        company: "SnackCo",
        icon: "fa-cookie-bite",
        color: "#f59e0b",
        questionsList: [
          "How often do you buy snacks?",
          "What influences your snack choices?"
        ]
      },
      {
        id: "survey_6",
        title: "Fitness & Wellness Habits",
        description: "Tell us about your exercise and wellness routine.",
        reward: 0.95,
        timeEstimate: "4 min",
        questions: 4,
        category: "health",
        tags: ["Fitness", "Wellness", "Health"],
        company: "Wellness Institute",
        icon: "fa-heartbeat",
        color: "#10b981",
        questionsList: [
          "How often do you exercise?",
          "What type of workouts do you prefer?",
          "Do you use fitness apps?",
          "What motivates you to stay active?"
        ]
      },
      {
        id: "survey_7",
        title: "Online Shopping Habits",
        description: "Share how you shop online and what influences your purchases.",
        reward: 0.85,
        timeEstimate: "4 min",
        questions: 4,
        category: "consumer",
        tags: ["Shopping", "E-commerce", "Retail"],
        company: "Retail Analytics",
        icon: "fa-shopping-cart",
        color: "#ef4444",
        questionsList: [
          "How often do you shop online?",
          "What's your favorite shopping platform?",
          "What influences your purchase decisions?",
          "How much do you typically spend per month?"
        ]
      },
      {
        id: "survey_8",
        title: "Social Media Usage",
        description: "Tell us about your social media habits.",
        reward: 0.70,
        timeEstimate: "3 min",
        questions: 3,
        category: "tech",
        tags: ["Social Media", "Digital", "Apps"],
        company: "Social Insights",
        icon: "fa-hashtag",
        color: "#3b82f6",
        questionsList: [
          "Which social media platforms do you use?",
          "How many hours per day do you spend on social media?",
          "What type of content do you engage with most?"
        ]
      }
    ];

    let surveys = [];
    let currentUser = null;
    let completedSurveys = [];
    let currentFilter = 'all';
    let currentCategory = 'all';
    let surveysEarned = 0;

    function checkAuth() {
      const isLoggedIn = localStorage.getItem('taskpay_logged_in');
      if (isLoggedIn !== 'true') {
        window.location.href = 'login.html';
        return false;
      }
      currentUser = localStorage.getItem('taskpay_user_email');
      loadUserData();
      return true;
    }

    function loadUserData() {
      const userKey = currentUser.replace(/[^a-zA-Z0-9]/g, '_');
      const storedCompleted = localStorage.getItem(`taskpay_completed_surveys_${userKey}`);
      completedSurveys = storedCompleted ? JSON.parse(storedCompleted) : [];
      
      const surveysDone = parseInt(localStorage.getItem(`taskpay_surveys_done_${userKey}`) || '0');
      const totalEarned = parseFloat(localStorage.getItem(`taskpay_total_earned_${userKey}`) || '0');
      
      // Calculate surveys earned (rough estimate for demo)
      surveysEarned = totalEarned * 0.4;
      
      // Mark surveys as completed based on stored IDs
      surveys = allSurveys.map(survey => ({
        ...survey,
        completed: completedSurveys.includes(survey.id)
      }));
      
      updateStats();
      renderSurveys();
    }

    function updateStats() {
      const completedCount = surveys.filter(s => s.completed).length;
      const availableCount = surveys.filter(s => !s.completed).length;
      
      document.getElementById('completedCount').textContent = completedCount;
      document.getElementById('availableCount').textContent = availableCount;
      document.getElementById('surveysEarned').textContent = `$${surveysEarned.toFixed(2)}`;
      
      const userName = currentUser.split('@')[0];
      document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
    }

    function renderSurveys() {
      let filteredSurveys = [...surveys];
      
      // Apply category filter
      if (currentCategory !== 'all') {
        filteredSurveys = filteredSurveys.filter(s => s.category === currentCategory);
      }
      
      // Apply status/sort filter
      switch(currentFilter) {
        case 'available':
          filteredSurveys = filteredSurveys.filter(s => !s.completed);
          break;
        case 'completed':
          filteredSurveys = filteredSurveys.filter(s => s.completed);
          break;
        case 'highest':
          filteredSurveys = [...filteredSurveys].sort((a, b) => b.reward - a.reward);
          break;
        case 'short':
          filteredSurveys = [...filteredSurveys].sort((a, b) => a.questions - b.questions);
          break;
        default:
          filteredSurveys = [...filteredSurveys];
      }
      
      const container = document.getElementById('surveysContainer');
      
      if (filteredSurveys.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-poll"></i>
            <h3>No surveys found</h3>
            <p>${currentFilter === 'completed' ? 'You haven\'t completed any surveys yet.' : 'Check back later for new surveys!'}</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = filteredSurveys.map(survey => `
        <div class="survey-card" data-survey-id="${survey.id}" data-completed="${survey.completed}">
          <div class="survey-header" style="background: linear-gradient(135deg, ${survey.color}, ${survey.color}dd);">
            ${survey.popular ? '<div class="popular-badge"><i class="fas fa-fire"></i> Popular</div>' : ''}
            <div class="survey-category">
              <i class="fas ${survey.icon}"></i> ${survey.category.charAt(0).toUpperCase() + survey.category.slice(1)}
            </div>
            <h3 class="survey-title">${survey.title}</h3>
            <p class="survey-description">${survey.description}</p>
            <div class="survey-stats">
              <span><i class="far fa-clock"></i> ${survey.timeEstimate}</span>
              <span><i class="far fa-question-circle"></i> ${survey.questions} questions</span>
            </div>
          </div>
          <div class="survey-content">
            <div class="reward-section">
              <div class="survey-reward">
                $${survey.reward.toFixed(2)} <small>USD</small>
              </div>
              <div class="survey-time">
                <i class="fas fa-hourglass-half"></i>
                <span>${survey.timeEstimate}</span>
              </div>
            </div>
            <div class="survey-details">
              <div class="detail-item">
                <i class="fas fa-building"></i>
                <span>${survey.company}</span>
              </div>
              <div class="detail-item">
                <i class="fas fa-chart-line"></i>
                <span>Market Research</span>
              </div>
            </div>
            <div class="tags">
              ${survey.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
            <div class="survey-footer">
              ${survey.completed ? 
                `<div class="completed-badge">
                  <i class="fas fa-check-circle"></i>
                  <span>Completed • +$${survey.reward.toFixed(2)}</span>
                </div>` : 
                `<button class="start-btn" onclick="startSurvey('${survey.id}')">
                  <i class="fas fa-play"></i> Take Survey
                </button>`
              }
            </div>
          </div>
        </div>
      `).join('');
    }

    function startSurvey(surveyId) {
      const survey = surveys.find(s => s.id === surveyId);
      if (survey.completed) {
        showToast('You already completed this survey!', 'error');
        return;
      }
      
      // Store current survey in session to load in survey detail page
      sessionStorage.setItem('current_survey', JSON.stringify(survey));
      window.location.href = `survey-detail.html?id=${surveyId}`;
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function logout() {
      localStorage.removeItem('taskpay_logged_in');
      localStorage.removeItem('taskpay_user_email');
      window.location.href = 'login.html';
    }

    // Category filter event listeners
    document.querySelectorAll('.category-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        currentCategory = pill.dataset.category;
        renderSurveys();
      });
    });

    // Status filter event listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderSurveys();
      });
    });

    document.getElementById('logoutBtn').addEventListener('click', logout);
    
    // Make startSurvey available globally
    window.startSurvey = startSurvey;
    
    // Initialize
    if (checkAuth()) {
      // No additional init needed
    }
  </script>
</body>
</html>
